<!DOCTYPE html>
<html>
<head>
<title>To-Do List</title>

<style>
body {
  font-family: Arial;
  background: linear-gradient(to right, #ff758c, #ff7eb3);
  text-align: center;
  color: white;
}

input {
  padding: 10px;
  width: 200px;
  border-radius: 5px;
  border: none;
}

button {
  padding: 10px 15px;
  margin: 5px;
  border: none;
  border-radius: 5px;
  background: #333;
  color: white;
  cursor: pointer;
}

ul {
  list-style: none;
  padding: 0;
}

li {
  background: white;
  color: black;
  margin: 10px auto;
  padding: 10px;
  width: 250px;
  border-radius: 5px;
}
</style>

</head>

<body>

<h2>My To-Do List ✅</h2>

<input type="text" id="taskInput" placeholder="Enter task">
<button onclick="addTask()">Add</button>

<ul id="taskList"></ul>

<script>
function addTask() {
let input = document.getElementById("taskInput");

if(input.value === "") return;

let li = document.createElement("li");
li.textContent = input.value;

li.onclick = function() {
li.style.textDecoration = "line-through";
};

let btn = document.createElement("button");
btn.textContent = " Delete";
btn.onclick = function() {
li.remove();
};

li.appendChild(btn);
document.getElementById("taskList").appendChild(li);

input.value = "";
}
</script>

</body>
</html>
