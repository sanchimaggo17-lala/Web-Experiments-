<!DOCTYPE html>
<html>
<head>
<title>My Website</title>
<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(135deg, #667eea, #764ba2);
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

.container {
  background: white;
  padding: 40px;
  border-radius: 15px;
  text-align: center;
  box-shadow: 0 10px 30px rgba(0,0,0,0.2);
  width: 300px;
}

h1 {
  color: #333;
}

a {
  display: block;
  margin: 15px 0;
  padding: 12px;
  border-radius: 10px;
  text-decoration: none;
  color: white;
  background: #667eea;
  transition: 0.3s;
}

a:hover {
  background: #764ba2;
  transform: scale(1.05);
}
</style>
</head>

<body>

<div class="container">
  <h1>Welcome 👋</h1>
  <a href="portfolio.html">My Portfolio</a>
  <a href="todo.html">To-Do App</a>

</body>
</html>
